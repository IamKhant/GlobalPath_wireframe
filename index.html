<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalPath Education — Wireframes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --blue: #1E40AF;
    --blue-light: #DBEAFE;
    --blue-mid: #93C5FD;
    --dark: #0F172A;
    --gray-900: #1E293B;
    --gray-600: #475569;
    --gray-400: #94A3B8;
    --gray-200: #E2E8F0;
    --gray-100: #F1F5F9;
    --white: #FFFFFF;
    --accent: #F59E0B;
    --wire-bg: #F8FAFF;
    --wire-box: #E8EEFF;
    --wire-border: #93C5FD;
    --wire-dark: #3B5BDB;
    --wire-placeholder: #CBD5E1;
    --wire-text: #334155;
    --wire-label: #1E40AF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0F172A;
    color: var(--white);
    min-height: 100vh;
  }

  /* ── SHELL ── */
  .shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #0A0F1E;
    border-right: 1px solid rgba(147,197,253,0.15);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(147,197,253,0.1);
  }

  .brand-mark {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--blue-mid);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .brand-title {
    font-size: 15px;
    font-weight: 600;
    color: white;
  }

  .sidebar-section {
    padding: 12px 20px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  .page-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--gray-400);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
    border-left: 2px solid transparent;
  }

  .page-btn:hover { background: rgba(147,197,253,0.06); color: #BDD7FF; }
  .page-btn.active { background: rgba(30,64,175,0.18); color: white; border-left-color: var(--blue-mid); }

  .page-btn .badge {
    margin-left: auto;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    background: rgba(147,197,253,0.12);
    color: var(--blue-mid);
    font-family: 'Space Mono', monospace;
  }

  .page-btn .badge.auth { background: rgba(245,158,11,0.15); color: #FCD34D; }

  .page-num {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: rgba(147,197,253,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--blue-mid);
    flex-shrink: 0;
  }
  .page-btn.active .page-num {
    background: var(--blue);
    color: white;
  }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: #0A0F1E;
    border-bottom: 1px solid rgba(147,197,253,0.12);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 14px;
    font-weight: 600;
    color: white;
  }

  .topbar-route {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--blue-mid);
    background: rgba(30,64,175,0.15);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid rgba(147,197,253,0.2);
  }

  .topbar-auth {
    margin-left: auto;
    font-size: 11px;
    color: #FCD34D;
    background: rgba(245,158,11,0.1);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid rgba(245,158,11,0.2);
    font-family: 'Space Mono', monospace;
  }

  /* ── CANVAS ── */
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    background: #111827;
    padding: 32px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* ── WIREFRAME DEVICE FRAME ── */
  .device-frame {
    width: 860px;
    min-height: 600px;
    background: var(--wire-bg);
    border-radius: 8px;
    border: 2px solid rgba(147,197,253,0.3);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 40px 80px rgba(0,0,0,0.5);
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ── WIREFRAME STYLES ── */
  .wf-nav {
    height: 52px;
    background: var(--wire-dark);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
  }

  .wf-logo {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.08em;
  }

  .wf-navlinks {
    display: flex;
    gap: 20px;
    flex: 1;
    justify-content: center;
  }

  .wf-navlink {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    padding: 4px 8px;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
  }

  .wf-navlink.active {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  .wf-nav-auth {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .wf-btn-ghost {
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    font-family: 'DM Sans', sans-serif;
  }

  .wf-btn-solid {
    padding: 5px 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    font-size: 10px;
    color: white;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
  }

  .wf-section {
    padding: 28px 32px;
  }

  .wf-section + .wf-section {
    border-top: 1px solid var(--gray-200);
  }

  /* boxes / placeholders */
  .wf-box {
    background: var(--wire-box);
    border: 1.5px dashed var(--wire-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wire-label);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    text-align: center;
    padding: 8px;
    line-height: 1.5;
  }

  .wf-img { background: var(--wire-placeholder); border: 1.5px solid var(--wire-border); border-radius: 6px; }

  .wf-label {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--wire-label);
    margin-bottom: 6px;
  }

  .wf-hero {
    background: var(--wire-dark);
    padding: 48px 32px 40px;
    text-align: center;
    position: relative;
  }

  .wf-h1 { font-size: 26px; font-weight: 700; color: white; margin-bottom: 8px; }
  .wf-h2 { font-size: 18px; font-weight: 600; color: var(--wire-text); margin-bottom: 12px; }
  .wf-h3 { font-size: 13px; font-weight: 600; color: var(--wire-text); margin-bottom: 6px; }
  .wf-p { font-size: 11px; color: var(--gray-600); line-height: 1.6; }
  .wf-sub { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 24px; }

  .wf-searchbar {
    display: flex;
    max-width: 500px;
    margin: 0 auto;
    background: white;
    border-radius: 6px;
    overflow: hidden;
    border: 1.5px solid var(--wire-border);
  }

  .wf-searchbar input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 12px;
    outline: none;
    background: transparent;
    color: var(--wire-text);
  }

  .wf-searchbar-btn {
    padding: 10px 20px;
    background: var(--wire-dark);
    color: white;
    font-size: 11px;
    font-weight: 600;
    border: none;
  }

  .wf-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--wire-box);
    border-top: 1.5px solid var(--wire-border);
  }

  .wf-stat {
    padding: 16px;
    text-align: center;
    border-right: 1px dashed var(--wire-border);
  }
  .wf-stat:last-child { border-right: none; }
  .wf-stat-n { font-size: 22px; font-weight: 700; color: var(--wire-dark); }
  .wf-stat-l { font-size: 10px; color: var(--gray-600); }

  .wf-grid { display: grid; gap: 16px; }
  .wf-grid-3 { grid-template-columns: repeat(3, 1fr); }
  .wf-grid-2 { grid-template-columns: repeat(2, 1fr); }

  .wf-card {
    background: white;
    border: 1.5px solid var(--wire-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .wf-card-img { height: 64px; }
  .wf-card-body { padding: 12px; }
  .wf-card-tag {
    display: inline-block;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--wire-box);
    color: var(--wire-label);
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }
  .wf-card-actions {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px dashed var(--wire-border);
    background: var(--wire-box);
  }
  .wf-card-action {
    flex: 1;
    height: 24px;
    border-radius: 4px;
    background: var(--wire-placeholder);
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--wire-text);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-sidebar-filter {
    background: white;
    border: 1.5px solid var(--wire-border);
    border-radius: 8px;
    padding: 16px;
  }

  .wf-input {
    width: 100%;
    height: 32px;
    border: 1.5px solid var(--wire-border);
    border-radius: 5px;
    background: var(--wire-box);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 10px;
    color: var(--gray-400);
  }

  .wf-check-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 7px;
  }
  .wf-check {
    width: 13px;
    height: 13px;
    border: 1.5px solid var(--wire-border);
    border-radius: 2px;
    background: var(--wire-box);
    flex-shrink: 0;
  }
  .wf-check-label { font-size: 11px; color: var(--wire-text); }

  .wf-range {
    width: 100%;
    height: 4px;
    background: var(--wire-border);
    border-radius: 2px;
    margin: 8px 0 12px;
    position: relative;
  }
  .wf-range::after {
    content: '';
    position: absolute;
    left: 15%;
    width: 55%;
    height: 4px;
    background: var(--wire-dark);
    border-radius: 2px;
  }

  .wf-footer {
    background: var(--wire-dark);
    padding: 20px 32px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 24px;
  }

  .wf-footer-col-title { font-size: 10px; font-weight: 700; color: white; margin-bottom: 8px; }
  .wf-footer-link { height: 10px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-bottom: 6px; }

  .wf-badge-auth {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    background: rgba(245,158,11,0.15);
    color: #B45309;
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid #FDE68A;
    margin-left: 8px;
  }

  .wf-compare-bar {
    position: relative;
    background: var(--wire-dark);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .wf-compare-mini {
    width: 100px;
    height: 36px;
    border-radius: 5px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    font-family: 'Space Mono', monospace;
  }
  .wf-compare-btn {
    margin-left: auto;
    padding: 8px 20px;
    background: white;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    color: var(--wire-dark);
    font-family: 'DM Sans', sans-serif;
  }

  .wf-detail-two-col {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    padding: 24px 32px;
  }

  .wf-detail-sticky {
    background: white;
    border: 1.5px solid var(--wire-border);
    border-radius: 8px;
    padding: 16px;
    align-self: start;
  }

  .wf-compare-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }
  .wf-compare-table th {
    background: var(--wire-dark);
    color: white;
    font-size: 11px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    font-weight: 600;
  }
  .wf-compare-table td {
    padding: 10px 14px;
    font-size: 11px;
    border: 1px solid var(--wire-border);
    color: var(--wire-text);
    background: white;
  }
  .wf-compare-table tr:nth-child(even) td { background: var(--wire-box); }
  .wf-compare-table .attr { font-weight: 600; color: var(--wire-label); background: var(--wire-box) !important; width: 120px; }

  .wf-form-row { margin-bottom: 14px; }
  .wf-form-label { font-size: 11px; font-weight: 600; color: var(--wire-text); margin-bottom: 5px; }
  .wf-form-input {
    width: 100%;
    height: 36px;
    border: 1.5px solid var(--wire-border);
    border-radius: 5px;
    background: white;
    padding: 0 12px;
    font-size: 11px;
    color: var(--gray-400);
    display: flex;
    align-items: center;
  }
  .wf-form-textarea {
    width: 100%;
    height: 72px;
    border: 1.5px solid var(--wire-border);
    border-radius: 5px;
    background: white;
  }
  .wf-submit {
    width: 100%;
    height: 40px;
    background: var(--wire-dark);
    border-radius: 6px;
    color: white;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .wf-dash-stat {
    background: white;
    border: 1.5px solid var(--wire-border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }

  .wf-tabs {
    display: flex;
    border-bottom: 2px solid var(--wire-border);
    margin-bottom: 16px;
    gap: 4px;
  }
  .wf-tab {
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-400);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
  }
  .wf-tab.active { color: var(--wire-dark); border-bottom-color: var(--wire-dark); }

  .wf-auth-card {
    max-width: 360px;
    margin: 32px auto;
    background: white;
    border: 1.5px solid var(--wire-border);
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(30,64,175,0.1);
  }

  .wf-divider {
    border: none;
    border-top: 1.5px dashed var(--wire-border);
    margin: 16px 0;
  }

  .wf-annotation {
    background: #FFFBEB;
    border: 1px solid #FDE68A;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 10px;
    color: #92400E;
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    display: inline-flex;
    align-items: flex-start;
    gap: 6px;
    max-width: 100%;
  }

  .wf-col-2 { display: flex; gap: 20px; }
  .wf-col-sidebar { width: 220px; flex-shrink: 0; }
  .wf-col-main { flex: 1; min-width: 0; }

  /* annotation arrows */
  .ann-wrap { position: relative; }
  .ann-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #EFF6FF;
    border: 1px solid var(--wire-border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--wire-label);
    margin: 4px 3px;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">Wireframes</div>
      <div class="brand-title">GlobalPath Education</div>
    </div>
    <div class="sidebar-section">Pages</div>

    <button class="page-btn active" onclick="showPage(0,this)">
      <span class="page-num">1</span> Home
      <span class="badge">/</span>
    </button>
    <button class="page-btn" onclick="showPage(1,this)">
      <span class="page-num">2</span> Programs
      <span class="badge">/programs</span>
    </button>
    <button class="page-btn" onclick="showPage(2,this)">
      <span class="page-num">3</span> Detail
      <span class="badge">/programs/:id</span>
    </button>
    <button class="page-btn" onclick="showPage(3,this)">
      <span class="page-num">4</span> Compare
      <span class="badge">/compare</span>
    </button>
    <button class="page-btn" onclick="showPage(4,this)">
      <span class="page-num">5</span> Bookmarks
      <span class="badge auth">AUTH</span>
    </button>
    <button class="page-btn" onclick="showPage(5,this)">
      <span class="page-num">6</span> Consultation
      <span class="badge">/consult</span>
    </button>
    <button class="page-btn" onclick="showPage(6,this)">
      <span class="page-num">7</span> Dashboard
      <span class="badge auth">AUTH</span>
    </button>
    <button class="page-btn" onclick="showPage(7,this)">
      <span class="page-num">8</span> Sign In / Up
      <span class="badge">/sign-in</span>
    </button>

    <div class="sidebar-section" style="margin-top:auto; padding-top: 20px;">Legend</div>
    <div style="padding: 8px 20px 20px; display:flex; flex-direction:column; gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--gray-400);">
        <div style="width:14px;height:14px;border-radius:2px;background:#E8EEFF;border:1.5px dashed #93C5FD;flex-shrink:0;"></div>
        Content placeholder
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--gray-400);">
        <div style="width:14px;height:14px;border-radius:2px;background:#CBD5E1;flex-shrink:0;"></div>
        Image placeholder
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--gray-400);">
        <div style="width:14px;height:14px;border-radius:2px;background:#FFFBEB;border:1px solid #FDE68A;flex-shrink:0;"></div>
        Annotation
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <!-- TOP BAR -->
    <div class="topbar" id="topbar">
      <div class="topbar-title" id="tb-title">Home Page</div>
      <div class="topbar-route" id="tb-route">/</div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap">
      <div class="device-frame" id="wf-frame">
        <!-- content injected by JS -->
      </div>
    </div>
  </div>
</div>

<script>
const pages = [
  // ── 0: HOME ──────────────────────────────────────────────────────────────
  {
    title: 'Home Page',
    route: '/',
    auth: false,
    html: `
      <div class="wf-nav">
        <span class="wf-logo">GLOBALPATH</span>
        <div class="wf-navlinks">
          <span class="wf-navlink active">Home</span>
          <span class="wf-navlink">Programs</span>
          <span class="wf-navlink">Compare</span>
          <span class="wf-navlink">Consultation</span>
        </div>
        <div class="wf-nav-auth">
          <span class="wf-btn-ghost">Sign In</span>
          <span class="wf-btn-solid">Sign Up</span>
        </div>
      </div>

      <!-- HERO -->
      <div class="wf-hero">
        <div class="wf-h1">Explore IT Programs Worldwide</div>
        <div class="wf-sub">59 programs across 9 countries — Bachelor, Diploma, Master and Bootcamp pathways</div>
        <div class="wf-searchbar">
          <input type="text" placeholder="Search by university, country, or keyword…" readonly>
          <div class="wf-searchbar-btn">Search</div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <span class="ann-chip">🇦🇺 Australia</span>
          <span class="ann-chip">🇨🇦 Canada</span>
          <span class="ann-chip">🇩🇪 Germany</span>
          <span class="ann-chip">🇮🇪 Ireland</span>
          <span class="ann-chip">🇯🇵 Japan</span>
          <span class="ann-chip">+3 more</span>
        </div>
      </div>

let current = 0;

function showPage(i, btn) {
  current = i;
  const p = pages[i];

  document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('tb-title').textContent = p.title;
  document.getElementById('tb-route').textContent = p.route;

  const auth = document.getElementById('tb-auth');
  if (auth) auth.remove();
  if (p.auth) {
    const chip = document.createElement('div');
    chip.id = 'tb-auth';
    chip.className = 'topbar-auth';
    chip.textContent = '🔒 Auth Required';
    document.querySelector('.topbar').appendChild(chip);
  }

  document.getElementById('wf-frame').innerHTML = p.html;
}

// init
document.getElementById('wf-frame').innerHTML = pages[0].html;
